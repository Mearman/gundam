name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: write
    pages: write
    id-token: write
    issues: write
    pull-requests: write

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    lint-commits:
        name: Lint commits
        runs-on: ubuntu-latest
        if: github.event_name == 'pull_request'
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v4
              with:
                  version: 11

            - uses: actions/setup-node@v4
              with:
                  node-version-file: .tool-versions
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - name: Lint commit messages
              run: |
                  pnpm exec commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

    audit:
        name: Audit
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 11

            - uses: actions/setup-node@v4
              with:
                  node-version-file: .tool-versions
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - run: pnpm audit --audit-level high

    check:
        name: Check
        needs: audit
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 11

            - uses: actions/setup-node@v4
              with:
                  node-version-file: .tool-versions
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - run: pnpm run lint

            - run: pnpm run build

    pages-build:
        name: Build Pages site
        needs: check
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 11

            - uses: actions/setup-node@v4
              with:
                  node-version-file: .tool-versions
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - run: pnpm run build

            - uses: actions/upload-pages-artifact@v3
              with:
                  path: dist

    pages-deploy:
        name: Deploy Pages site
        needs: [check, release]
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4

    release:
        name: Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        needs: check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  persist-credentials: false

            - uses: pnpm/action-setup@v4
              with:
                  version: 11

            - uses: actions/setup-node@v4
              with:
                  node-version-file: .tool-versions
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - name: Release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  HUSKY: "0"
              run: pnpm exec semantic-release
